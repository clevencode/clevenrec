<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClevenRec</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0e12;
      --accent: #3ddea8;
      --text: #e8eaef;
      --muted: #8b93a7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      user-select: none;
      -webkit-app-region: drag;
    }
    .splash {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background:
        radial-gradient(ellipse 70% 50% at 50% 35%, rgba(61, 222, 168, 0.14), transparent 60%),
        var(--bg);
    }
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      object-fit: cover;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      animation: rise 0.55s ease both;
    }
    .brand {
      text-align: center;
      animation: rise 0.55s ease 0.08s both;
    }
    .name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }
    .name span { color: var(--accent); }
    .tag {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .bar {
      width: 120px;
      height: 3px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      margin-top: 8px;
      animation: rise 0.55s ease 0.16s both;
    }
    .bar > i {
      display: block;
      height: 100%;
      width: 40%;
      border-radius: inherit;
      background: var(--accent);
      animation: slide 1.1s ease-in-out infinite;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes slide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <img class="logo" src="public/icon.png" alt="ClevenRec">
    <div class="brand">
      <div class="name">Cleven<span>Rec</span></div>
      <div class="tag">scrcpy + OBS</div>
    </div>
    <div class="bar"><i></i></div>
  </div>
</body>
</html>
